# Application configuration for RealLlmExample
# References default configuration from structured-llm module

include "structured-llm-reference.conf"

# ============================================================================
# USER OVERRIDES - Provide your settings here or via environment variables
# ============================================================================

# Override LLM provider selection (MANDATORY - no default in reference.conf)
# Environment variable: LLM_MODEL has precedence
llm4s.llm.model = "openai/gpt-4o"

# Override provider-specific settings
# SECURITY: Prefer environment variables over hardcoded values
# Env vars: OPENAI_API_KEY, ANTHROPIC_API_KEY, AZURE_API_KEY, AZURE_API_BASE
llm4s.openai.apiKey = ${?OPENAI_API_KEY}

# Alternative: Uncomment and set directly (NOT recommended for production)
# llm4s.openai.apiKey = "sk-your-api-key-here"

# Application-specific settings
app {
  # Path to Smithy schema file (relative to project root or current directory)
  smithy.schema.path = "structured-llm-test-models/src/main/smithy/resume.smithy"

  # Path to resume text file to process (relative to project root or current directory)
  resume.input.path = "samples/resume/sample.txt"

  # Log full prompt being sent to LLM (default: true)
  log.prompt = true
}

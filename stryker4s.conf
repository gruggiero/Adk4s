stryker4s {
  // Ring 5 — retarget to the changed production files per spec.
  // Re-point this glob to each spec's changed files before running.
  // Globs are resolved relative to the mutated module's base dir, so use
  // base-agnostic `**` patterns rather than repo-root paths.
  //
  // Example for structured-llm:
  //   mutate = ["**/sap/SchemaAlignedParser.scala"]
  // Example for adk4s-core:
  //   mutate = ["**/tools/ToolsNode.scala"]

  mutate = [
    "**/memory/AgentMemory.scala",
    "**/memory/Episode.scala",
    "**/memory/InMemoryAgentMemory.scala",
    "**/memory/MemoryHit.scala"
  ]

  thresholds {
    high = 95
    low = 91
    break = 90
  }
}

rules = [
  DisableSyntax
]

# Exclude infrastructure files that legitimately need try-catch-finally
# for resource management, state restoration, or exception suppression
DisableSyntax.excludePackages = [
  "org.adk4s.core.safety",           # UsingOps needs try-finally for resource management
  "org.adk4s.agent.orchestration",   # MDCContext, CancellationToken, Policies need try-catch-finally
  "org.adk4s.config",                 # Allow ConfigFactory only here via ConfigReader
  "org.adk4s.samples",                # Samples/CLIs are application edge
  "org.adk4s.structured.example",     # Example/test code is application edge
  "org.adk4s.structured.test"         # Test code is application edge
]

DisableSyntax {
  # Syntactic regex checks; no SemanticDB required
  regex = [
    {
      id = NoConfigFactory
      pattern = "\\bConfigFactory\\b"
      message = "Use PureConfig via Adk4sConfig at the app/test edge; do not call ConfigFactory directly."
    },
    {
      id = NoSysEnv
      pattern = "\\bsys\\.env\\b"
      message = "Read config via Adk4sConfig in app/test code; avoid sys.env in libraries."
    },
    {
      id = NoSystemGetenv
      pattern = "\\bSystem\\.getenv\\b"
      message = "Read config via Adk4sConfig in app/test code; avoid System.getenv in libraries."
    },
    {
      id = NoKeywordTry
      # Forbid the try {...} keyword form; allow scala.util.Try(...)
      pattern = "(?s)\\btry\\s*\\{"
      message = "Prefer scala.util.Try(...).toResult — import org.adk4s.types.TryOps"
    },
    {
      id = NoKeywordCatch
      pattern = "(?s)\\bcatch\\s*\\{"
      message = "Prefer mapping Result errors instead of catch; use Try(...).toResult and .left.map/.fold"
    },
    {
      id = NoKeywordFinally
      pattern = "(?s)\\bfinally\\b"
      message = "Prefer ManagedResource/Using or ensure cleanup via dedicated combinators"
    }
  ]
}

# ---- Scoped guards for main (non-test) core sources ----
# Forbid Adk4sConfig imports/refs in core main sources outside the config package
DisableSyntax.NoAdk4sConfig {
  fileFilter = "glob:adk4s-core/src/main/scala/**"
  excludePackages = ["org.adk4s.config"]
  regex = [
    {
      id = NoAdk4sConfigInCore
      pattern = "\\borg\\.adk4s\\.config\\.Adk4sConfig\\b|\\bimport\\s+org\\.adk4s\\.config\\.Adk4sConfig\\b"
      message = "Inject typed config at the app edge; avoid calling Adk4sConfig from core main sources."
    }
  ]
}

# Forbid direct PureConfig default reads in core main sources outside the config package
DisableSyntax.NoPureConfigDefault {
  fileFilter = "glob:adk4s-core/src/main/scala/**"
  excludePackages = ["org.adk4s.config"]
  regex = [
    {
      id = NoPureConfigDefaultInCore
      pattern = "\\bConfigSource\\.default\\b"
      message = "Inject typed config at the app edge; avoid direct PureConfig reads in core main sources."
    }
  ]
}

# Forbid sys.env/System.getenv in core main sources outside config
DisableSyntax.NoEnvReads {
  fileFilter = "glob:adk4s-core/src/main/scala/**"
  excludePackages = ["org.adk4s.config"]
  regex = [
    { id = NoSysEnvInCore, pattern = "\\bsys\\.env\\b", message = "Use typed config; avoid sys.env in core main sources." },
    { id = NoSystemGetenvInCore, pattern = "\\bSystem\\.getenv\\b", message = "Use typed config; avoid System.getenv in core main sources." }
  ]
}

# Also apply the same guards to structured-llm module
DisableSyntax.NoAdk4sConfigStructuredLLM {
  fileFilter = "glob:structured-llm/src/main/scala/**"
  excludePackages = ["org.adk4s.config"]
  regex = [
    {
      id = NoAdk4sConfigInStructuredLLM
      pattern = "\\borg\\.adk4s\\.config\\.Adk4sConfig\\b|\\bimport\\s+org\\.adk4s\\.config\\.Adk4sConfig\\b"
      message = "Inject typed config at the app edge; avoid calling Adk4sConfig from structured-llm main sources."
    }
  ]
}

DisableSyntax.NoPureConfigDefaultStructuredLLM {
  fileFilter = "glob:structured-llm/src/main/scala/**"
  excludePackages = ["org.adk4s.config"]
  regex = [
    {
      id = NoPureConfigDefaultInStructuredLLM
      pattern = "\\bConfigSource\\.default\\b"
      message = "Inject typed config at the app edge; avoid direct PureConfig reads in structured-llm main sources."
    }
  ]
}

DisableSyntax.NoEnvReadsStructuredLLM {
  fileFilter = "glob:structured-llm/src/main/scala/**"
  excludePackages = ["org.adk4s.config"]
  regex = [
    { id = NoSysEnvInStructuredLLM, pattern = "\\bsys\\.env\\b", message = "Use typed config; avoid sys.env in structured-llm main sources." },
    { id = NoSystemGetenvInStructuredLLM, pattern = "\\bSystem\\.getenv\\b", message = "Use typed config; avoid System.getenv in structured-llm main sources." }
  ]
}

# Default LLM provider configurations for structured-llm module
# Users override these in structured-llm-test-models/application.conf

# SECURITY: DO NOT commit actual API keys here
# Users should provide keys in their application.conf or via environment variables

llm4s {
  # MANDATORY: LLM provider and model
  # Format: provider/model-name (e.g., "openai/gpt-4o", "anthropic/claude-3-7-sonnet-latest")
  # No default - must be set in application.conf
  # Environment variable: LLM_MODEL
  llm.model = ${?LLM_MODEL}

  # OpenAI Provider
  openai {
    baseUrl = "https://api.openai.com/v1"
    # MANDATORY if using openai provider (no default in this file):
    # Environment variable: OPENAI_API_KEY
    # apiKey = ${?OPENAI_API_KEY}
    # Environment variable: OPENAI_ORGANIZATION (optional)
    organization = ${?OPENAI_ORGANIZATION}
  }

  # Azure OpenAI Provider
  azure {
    apiVersion = "V2025_01_01_PREVIEW"
    # MANDATORY if using azure provider (no default in this file):
    # Environment variable: AZURE_API_BASE
    # endpoint = ${?AZURE_API_BASE}
    # Environment variable: AZURE_API_KEY
    # apiKey = ${?AZURE_API_KEY}
  }

  # Anthropic Provider
  anthropic {
    baseUrl = "https://api.anthropic.com"
    # MANDATORY if using anthropic provider (no default in this file):
    # Environment variable: ANTHROPIC_API_KEY
    # apiKey = ${?ANTHROPIC_API_KEY}
  }

  # Ollama Provider
  ollama {
    baseUrl = "http://localhost:11434"
  }

  # Completion Options (all optional with defaults)
  completion {
    temperature = 0.7
    topP = 1.0
    # maxTokens = 1024
    presencePenalty = 0.0
    frequencyPenalty = 0.0
    reasoning = "none"  # none, low, medium, high
    # budgetTokens = 16000  # For Anthropic extended thinking
  }
}

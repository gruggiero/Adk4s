# openspec/config.yaml — Project configuration for verified-scala3 schema (v2)
#
# This file is injected into ALL artifact instructions so the AI always
# has project context. The stack below reflects what is DETECTED in this
# repository (see the capability-profile artifact of the active change);
# if this file disagrees with capability-profile.md, the profile wins.

schema: verified-scala3

# ── Project Context ──────────────────────────────────────────────────────
context: |
  STACK SOURCE OF TRUTH:
  - The authoritative stack description is capability-profile.md in the
    current change directory, generated by inspecting build.sbt,
    project/plugins.sbt, project/Versions.scala, project/Dependencies.scala,
    and source code. If this context section disagrees with
    capability-profile.md, the profile wins — update this file.
  - NEVER generate code or tests for a library that is not in the detected
    stack (e.g. do not generate ScalaTest tests — this project uses munit;
    do not generate circe code — this project uses upickle/ujson;
    do not generate ScalaCheck properties — this project uses Hedgehog).

  PROJECT: adk4s (Agent Development Kit for Scala 3) — a functional,
  type-safe agent toolkit built on top of llm4s (LLM client), workflows4s
  (workflow engine), and smithy4s (schema codegen). It provides structured
  LLM outputs, tool execution, streaming, multi-agent orchestration,
  interrupt/resume, and real-time observability. It is a LIBRARY + examples
  project, not a service.

  DETECTED STACK (verified against build.sbt / project/* on 2026-06-28):
  - Scala 3.8.4, sbt 1.12.12, JDK 26 (Homebrew OpenJDK)
  - Multi-module sbt build with centralized dependency management:
    * project/Versions.scala — all version constants in one object
    * project/Dependencies.scala — all ModuleID definitions in one object
    * build.sbt — imports Dependencies._, references deps by name
  - Modules (6):
    * `structured-llm` — type-safe structured LLM outputs via Smithy schema
      injection + Schema-Aligned Parser (SAP). Depends on: llm4s, cats-effect,
      fs2-core, typesafe-config, workflows4s-core, smithy4s (core+json)
    * `structured-llm-test-models` — Smithy test schemas (codegen via
      smithy4s-sbt-codegen plugin). Depends on: structured-llm (compile->compile)
    * `adk4s-core` — components, tools, runnables, events, interrupts, streaming.
      Depends on: structured-llm, llm4s, cats-effect, fs2 (core+io)
    * `adk4s-orchestration` — ReactAgent, WIOGraph, workflows, branching,
      state management, interrupt/resume. Depends on: adk4s-core,
      structured-llm, cats-effect, workflows4s-core, fs2 (core+io)
    * `adk4s-examples` — 55 example files. Depends on: adk4s-core,
      adk4s-orchestration, structured-llm, structured-llm-test-models,
      llm4s, cats-effect, workflows4s (core+bpmn), fs2 (core+io), logback
    * `verified` — Ring 6 Stainless formal verification module (leaf, pinned
      to Scala 3.7.2, not aggregated by root). Contains pure-model mirrors
      of algorithms for formal verification. Run with: sbt -J-Xmx6g ring6
  - scalacOptions: -deprecation, -feature, -unchecked,
    -Xkind-projector:underscores, -source:future (shared via scala3Options val)
    NOTE: -Werror is NOT active; warnings do not fail the build.
  - Effect system: cats-effect 3.7.0; streaming: fs2 3.13.0 (core+io)
  - LLM client: llm4s core 0.3.4 (Maven Central) — LLMClient, Conversation,

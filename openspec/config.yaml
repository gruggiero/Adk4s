  - NOT PRESENT: TLA+/Apalache, otel4s, Daut, Iron, circe, http4s,
    Pekko/Akka, Doobie/Skunk

  CODING CONVENTIONS (functional-first):
  - Use functional programming principles: immutable data, pure functions
  - Use Cats for data structures, Cats Effect for effects
  - NEVER use isInstanceOf / asInstanceOf — use pattern matching instead
  - NEVER use the 'Any' type
  - Write explicit types in all expressions — do not rely on inference
  - Import only needed symbols — no wildcard imports (no `*` or `_` import-all)
  - Errors modeled as sealed hierarchies (AdkError, StructuredLLMError),
    not exceptions. llm4s uses Result[A] = Either[LLMError, A];
    adk4s wraps in F[_] (Cats Effect) with error translation.
  - No side effects outside F[_] / IO — no var, no null, no throw
  - Given/When/Then format for requirements and scenarios

  KEY ARCHITECTURE PATTERNS:
  - ChatModel[F[_]] wraps llm4s LLMClient into effect-polymorphic interface
  - StructuredLLM[F[_]] injects Smithy schema into prompts, parses via SAP
  - Tool / InvokableTool / StreamableTool — three-tier tool abstraction
  - ToolWrapper stores both originalToolFunction and executable (dual storage
    needed because reverse cast fails at runtime)
  - ReactAgent — ReAct loop: LLM call → tool execution → feedback → repeat
  - WIOGraph[Ctx, In, Err, Out] — type-safe DAG from WIONodes, compiles to WIO
  - AgentEvent / AgentEventEmitter — fs2.concurrent.Topic-backed event system
  - InterruptSignal / CheckpointStore — interrupt/resume lifecycle
  - MessageConverter bridges adk4s Message and llm4s Message (lossy: drops
    toolCallId and toolCalls)

# ── Per-Artifact Rules ───────────────────────────────────────────────────
rules:
  proposal:
    - Always include a verification strategy with ring checkboxes
    - Ring 3 is mandatory for every code-changing spec; waivers only for docs/formatting/build-metadata/test-only changes, stated explicitly
    - Ring 8 (adversarial spec-compliance review) is mandatory for every code-changing spec
    - Include a correctness risk level (low/medium/high) with justification
    - Reference concept-inventory.md for existing types before proposing new ones
    - Include the typed-contract decision table (full/minimal/waiver per change kind)
    - If the change affects API operations or event sequences AND the telemetry stack is detected, Ring 9 MUST be checked

  capability-profile:
    - Detect by reading build files and source — never assume or copy example values
    - Read project/Versions.scala and project/Dependencies.scala for exact versions
    - Record exact compile/test commands per module (used by typed contract and rings)
    - Record where typed-contract files must live to be genuinely compiled
    - Record which Scalafix rules are ACTIVE vs aspirational (e.g. PureConfig guards exist in .scalafix.conf but PureConfig is not a dependency)
    - Note that -Werror is NOT active (warnings don't fail the build)
    - Record which WartRemover warts are excluded vs active (currently many are temporarily excluded)
    - Record that stryker4s.conf has a fixed mutate list — Ring 5 must retarget it per spec
    - Record that the `verified` module is pinned to Scala 3.7.2 for Stainless compatibility

  concept-inventory:
    - Scan the ACTUAL project source tree, do not invent entries
    - Include exact package paths (used for import statements in implementation)
    - Scan all 5 modules: structured-llm, structured-llm-test-models, adk4s-core, adk4s-orchestration, adk4s-examples
    - Also scan llm4s types that are part of the public API surface (imported across modules)
    - Run the consistency check (packages importable, types match source) and record the result
    - For empty/new projects, create the tables with headers but no data rows

  specs:
    - Open every requirement with a normative SHALL/MUST statement before its Given clause (required by `openspec validate --strict`)
    - Use Given/When/Then format for ALL requirements; every Then must be observable
    - Every spec MUST have at least 2 Hedgehog properties in the Properties section
    - Properties must be INVARIANTS (forAll), not examples (specific values)
    - Properties use Hedgehog `Gen` with explicit `Range` sizing — NO Arbitrary typeclass.
      Properties extend `hedgehog.munit.HedgehogSuite` with
      `property("…") { for x <- gen.forAll yield <Result> }`.
      NOT ScalaCheck/munit-scalacheck.
    - Every property must declare its generator strategy (constructive preferred over .ensure-filtering; no Arbitrary typeclass — generators are always explicit)
    - Include model-based properties where relevant (event-sourcing replay, SAP parsing round-trips, tool execution semantics, serialization round-trips)
    - Concepts Used table must reference exact entries from concept-inventory.md
    - Concepts Introduced table is a COMMITMENT — implementation must honor it
    - Include at least one error/edge case scenario per requirement
    - Include a Proof Obligations table mapping every requirement/invariant/constraint to an enforcement mechanism
    - Any "unreachable" claim needs a type-level proof obligation or explicit runtime check
    - Enum/GADT extensions must state how existing pattern matches behave for new variants

  spec-lint:
    - Fail fast — a FAIL verdict blocks design and implementation-order
    - Flag vague words (valid, fast, reasonable, correct, appropriate) without concrete definitions
    - Verify every proof obligation has a declared enforcement mechanism
    - Verify properties use Hedgehog (not ScalaCheck — not in the stack)

  design:
    - Package structure must define project-specific layer rules from capability-profile.md (e.g. domain must not import the detected HTTP/messaging/DB libraries — though none are currently present)
    - Effect boundaries section must classify every module as pure or effectful (all current modules are effectful via cats-effect)
    - Type strategy must place every invariant on the invalid-state-prevention hierarchy (impossible > smart constructor > validator > fallback > silent mapping) and justify the placement
    - Error strategy must use sealed hierarchies (AdkError, StructuredLLMError), not exceptions
    - IDL model layout is REQUIRED if any spec has API operations or Smithy schema changes
    - Compatibility story (Ring 4) is REQUIRED if any spec touches persisted or wire data (JSON serialization, Smithy schemas, checkpoint state)
    - Verification map must assign rings to every module

  implementation-order:
    - Topological sort by concept dependency, not alphabetical
    - Simple specs before complex when no dependency constraint
    - Typed contract requirement recorded per spec (full/minimal/waiver) — mandatory for every code-changing spec
    - Record expected changed production files per spec (drives Ring 5 mutation targeting)
    - Every spec in the specs/ directory must appear in the sequence

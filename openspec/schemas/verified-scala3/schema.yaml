# Changelog:
#   6 — project-scoped living documents: capability-profile.md and
#       concept-inventory.md move to openspec/ root (siblings of the
#       openspec/concepts/ registry) instead of being re-created per change —
#       per-change copies drifted, died with archiving, and destroyed the
#       "Introduced By spec:X" provenance. The per-change artifacts become
#       thin check-reports (capability-check.md, inventory-check.md) that
#       create-if-missing / verify / refresh the project files and record
#       change-relevant deltas. Scanner is now MULTI-MODULE (discovers every
#       src/ root — previously a silent empty scan on multi-module builds).
#   5 — correctness-evidence release: Ring 0 escalates match-exhaustiveness to error
#       when fatal warnings are off; oracle-polarity run (red / green-by-design) at the
#       test-oracle gate; generator faithfulness (generators are part of the approved
#       oracle); per-spec baseline SHA + commit (fixes Ring 5 diff targeting, gives
#       checkpoints a durable identity); cross-module regression before checkpoint;
#       typed contract becomes a permanent API-conformance assertion after promotion;
#       Ring 8 moved BEFORE Rings 5/6/7 and made fresh-context; concurrency oracle
#       rules (deterministic test kits, seed capture, repeat runs); mechanical
#       spec-lint.sh + danger-scan.sh; scanner-diff concept delta; build-dependency
#       delta; risk-tiered human gates; tasks.md regenerated from
#       implementation-progress.md; ships openspec-property-tests and
#       openspec-adversarial-review skills; stack-agnostic template vocabulary;
#       registry-check verifies symbols file-scoped and cited actions against the
#       actions block.
#   4 — behavioral concept registry: fold-field verification, spec-reference lint,
#       CI templates, install-skills.
#   2.1 — first concept-registry support.
#   2 — ring pipeline + typed contract + test oracle.
name: verified-scala3
version: 6
description: >
  Depth-first verified Scala 3 workflow for functional, type-safe codebases.
  Correctness-first: every spec flows through
  spec → typed contract → proof obligations → test oracle → implementation → verification.
  Types and tests are designed BEFORE implementation so they act as an oracle
  derived from the specification, not a mirror of the generated code.
  Each spec is fully implemented and verified through all applicable rings
  (compile → lint → architecture → property tests → compatibility →
  adversarial review → mutation → formal/model → telemetry) before the next
  spec begins. The adversarial review runs BEFORE the expensive rings: it is
  cheap, frequently changes code and adds tests, and mutation must run on
  final code.
  Shared domain concepts accumulate incrementally via a concept inventory that
  prevents duplicate type creation. The actual project stack (test framework,
  actor/HTTP/persistence libraries, verification tools) is DETECTED, not assumed.
  Since version 6 both the capability profile and the concept inventory are
  PROJECT-SCOPED living documents (openspec/capability-profile.md,
  openspec/concept-inventory.md — siblings of the openspec/concepts/
  registry); each change verifies and refreshes them via thin check-report
  artifacts instead of re-creating them, so provenance and detection survive
  across changes.

  Since version 2.1 the workflow also supports a repo-level BEHAVIORAL CONCEPT
  REGISTRY (openspec/concepts/, in the Meng & Jackson "What You See Is What
  It Does" sense): specs reference behavior as Concept/action; each concept
  file's Implementation map is the single place code identifiers live;
  cross-concept flows are named synchronizations. Bootstrap a project with
  scanner/install-skills.sh (copies the schema's skill sources into the
  project's agent skill directories: .claude/skills/, .pi/skills/,
  .devin/skills/), the openspec-extract-concepts skill, and the
  templates/concept-registry/ templates; verify with
  scanner/registry-check.sh, wired into CI (dependency-free: bash + git
  grep). registry-check also verifies declared fold fields ("maps f1, f2, ..."
  rows must match the fold's file — the machine check for declared-but-never-
  folded state) and lints active change specs' "Concepts Used (behavioral)"
  tables against the registry. Registry-aware rules in the spec template and
  apply instruction are conditional — projects without a registry are
  unaffected.

artifacts:
  - id: proposal
    generates: proposal.md
    description: Intent, scope, verification strategy, correctness risk, and affected capabilities
    template: proposal.md
    instruction: |
      Write a clear proposal for the change. Beyond the standard scope and motivation,
      you MUST include:

      1. A VERIFICATION STRATEGY section with checkboxes for which rings apply to this
         change. Ring 0 (compile) and Ring 1 (lint) always apply.

         Ring 3 (property/scenario tests) is MANDATORY for every code-changing spec —
         including refactors, thread-safety changes, and internal restructurings
         (which need regression or property tests proving behavior preservation).
         The ONLY allowed Ring 3 waivers, which must be stated explicitly with
         rationale, are: docs-only, formatting-only, build-metadata-only, and
         test-only changes where the implementation is unaffected.
         If the change involves CONCURRENT behavior (parallel execution,
         streaming, timeouts, cancellation, interruption), say so here — Ring 3
         then requires deterministic concurrency tests using the detected
         deterministic test kit (see capability-profile consequences), never
         wall-clock sleeps.

         Ring 4 (wire/persistence compatibility) applies to any change touching
         serialization, persisted events/snapshots, wire formats (JSON, protobuf,
         Smithy), or message payloads.
         Ring 5 (mutation) applies to changed production logic where the mutation
         tool is available (see openspec/capability-profile.md).
         Ring 6 (formal) applies to pure computation modules.
         Ring 7 (model checking) optionally applies to distributed/event-driven
         invariants (event ordering, idempotency, replay, response guarantees).
         Ring 8 (adversarial spec-compliance review) is MANDATORY for every
         code-changing spec.
         Ring 9 (telemetry) applies when the change affects API operations or
         event sequences AND the telemetry stack is present per openspec/capability-profile.md.

      2. A CORRECTNESS RISK LEVEL (low / medium / high) with one-line justification.
         High-risk examples: evaluators, typecheckers, desugarers, mappers, money
         arithmetic, persistence schema changes, anything with fallback/default paths.
         The risk level, combined with each spec's complexity, determines the
         HUMAN GATE TIER during apply (implementation-order.md records it):
         only complexity=simple AND risk=low specs may combine the typed-contract
         and test-oracle gates into one presentation; everything else keeps two
         separate gates.

      3. An EXISTING CONCEPTS section that references types, traits, enums, and wire
         models already present in the project that this change will reuse. Populate
         it from the PROJECT inventory (openspec/concept-inventory.md) when it
         exists; otherwise scan the project source tree for `opaque type`,
         `sealed trait`, `enum`, service trait declarations, and IDL files
         (.smithy, .proto).

      4. A NEW CONCEPTS section previewing any new domain types, service methods, error
         variants, or wire operations this change will introduce.

      5. A TYPED CONTRACT DECISION table. The typed contract phase (formerly
         "pseudocode") is MANDATORY for every code-changing spec:
         - Full contract: new domain types, ADT/GADT variants, service methods,
           actor commands/events/state, IDL operations, evaluator/typechecker logic,
           public API signature changes, error algebra changes,
           persistence/serialization changes, event-sourcing/messaging wiring.
         - Minimal contract (signatures of touched code only): pure internal refactor.
         - Explicit human-approved waiver: docs-only, formatting-only, test-only.
    requires: []

  - id: capability-profile
    generates: capability-check.md
    description: >
      Verification report against the PROJECT-scoped capability profile
      (openspec/capability-profile.md — a living document, like
      openspec/concepts/). Creates the project profile if missing, verifies
      and refreshes it otherwise, and records the deltas relevant to this
      change. All later artifacts and the apply phase MUST generate code and
      tests for the DETECTED stack, never an assumed one.
    template: capability-check.md
    instruction: |
      The capability profile is PROJECT-SCOPED: it lives at
      openspec/capability-profile.md (NOT in the change directory) because it
      describes the project's stack, which is change-independent. Per-change
      copies drift, die with archiving, and force every change to re-detect
      from scratch. This artifact is the per-change CHECK against it:

      A. If openspec/capability-profile.md does NOT exist: create it now from
         templates/capability-profile.md using the detection procedure below.
      B. If it exists: RE-VERIFY it against the build (same procedure) —
         a profile that disagrees with build.sbt is stale ground truth.
         Update the project file in place; it is a living document.
      C. Write THIS change's capability-check.md (template) recording:
         the verification result, any rows added/corrected in the project
         profile, any NEW capabilities this change itself will introduce
         (new module, new library, new tooling — cross-referenced with the
         proposal), and the ring-availability consequences for THIS change.

      DETECTION PROCEDURE (for creating or re-verifying the project profile) —
      inspect these sources and record findings in the profile's tables; do
      NOT assume a stack, do NOT copy values from this schema's examples:
      1. `build.sbt`, `project/*.sbt`, `project/*.scala`, `project/plugins.sbt`:
         - Scala version(s), sbt version, modules/subprojects and their names
         - scalacOptions (note whether -Werror / fatal warnings are active)
      2. Library dependencies — classify what is ACTUALLY present:
         - Test framework: ScalaTest? munit? weaver? (record the exact one)
         - Property testing: ScalaCheck? scalatestplus-scalacheck? munit-scalacheck?
         - Effect system: cats-effect? ZIO? plain Future? none?
         - Actor framework: Pekko/Akka (typed? cluster? sharding? persistence)?
         - HTTP: http4s? Pekko HTTP? tapir?
         - Persistence: DynamoDB? PostgreSQL (skunk/doobie)? event-sourcing journal?
         - Streaming/messaging: Kafka (which client)? fs2?
         - Serialization/IDL: circe? protobuf/scalapb? Smithy/smithy4s? Avro?
         - Refined types: Iron? refined? neither?
         - Telemetry: otel4s? raw OpenTelemetry? Daut or other monitor lib? none?
      3. Verification tooling:
         - Mutation: sbt-stryker4s plugin present? `stryker4s.conf` present?
           If the conf has a fixed `mutate` list, record it — Ring 5 must
           dynamically retarget it per spec (see apply phase).
         - Formal: Stainless available on PATH or via plugin?
         - Test kits: ActorTestKit / BehaviorTestKit / PersistenceTestKit on the
           test classpath?
         - Deterministic concurrency testing: is the effect system's test kit
           (e.g. cats-effect-testkit `TestControl`, ZIO `TestClock`) on the test
           classpath? Record it — specs involving concurrency/timeouts/
           cancellation MUST use it (apply Step 2).
         - Property framework facilities: record the coverage-assertion
           mechanism (e.g. Hedgehog `cover` — fails when a label's percentage
           is unmet; ScalaCheck `classify`/`collect` — informational only) and
           the seed-fixing mechanism (e.g. Hedgehog fixed `Seed`, ScalaCheck
           `Test.Parameters.withInitialSeed`) — Ring 3 uses both.
      4. Static analysis:
         - `.scalafix.conf`: which rules are ACTIVE (DisableSyntax flags,
           OrganizeImports, custom architecture rules)?
         - WartRemover: enabled warts (note any commented-out)?
         - scalafmt: config present? is scalafmtCheck enforced?
      5. Compile commands that genuinely compile code in this project:
         - Record the exact commands for main and test compilation per module,
           e.g. `sbt <module>/compile`, `sbt <module>/Test/compile`.
         - Record where typed-contract files must live to be part of the real
           sbt source graph (test sources of the owning module).

      CONSEQUENCES — record these as explicit rules in the profile:
      - EXHAUSTIVENESS ESCALATION: if fatal warnings (-Werror) are NOT active,
        Ring 0 MUST escalate pattern-match exhaustiveness and unreachable-case
        warnings to errors (e.g. scalacOptions
        `-Wconf:name=PatternMatchExhaustivity:e,name=MatchCaseUnreachable:e`,
        or the project's equivalent). Record the exact escalation mechanism
        here. The schema's no-catch-all rules are unenforceable if an
        inexhaustive match over a sealed type merely warns.
      - Tests are generated for the DETECTED test framework (e.g. ScalaTest +
        ScalaTestPlus ScalaCheck → `AnyFunSuite`/`AnyFlatSpec` with
        `ScalaCheckPropertyChecks`, NOT munit).
      - If an actor framework is detected, actor specs use its test kits.
      - If a telemetry stack is absent, Ring 9 is either skipped with a stated
        correctness impact, or explicit setup tasks are added to the change.
      - If mutation tooling is absent, Ring 5 is skipped with a stated impact
        (consider a line-coverage tool, e.g. scoverage, as a weaker fallback
        signal for the affected modules — record the decision).
      - If a deterministic concurrency test kit is absent but the effect
        system is present, record it: concurrency-touching specs then need
        either a setup task adding the test kit or an explicit human-approved
        waiver with stated correctness impact.
      - Domain purity rules for Ring 2 (which packages must not import the
        detected infrastructure libraries).
    requires:
      - proposal

  - id: concept-inventory
    generates: inventory-check.md
    description: >
      Verification report against the PROJECT-scoped concept inventory
      (openspec/concept-inventory.md — the type-level companion of the
      behavioral registry at openspec/concepts/). Creates the project
      inventory if missing, verifies and refreshes it otherwise. Prevents
      duplicate creation and enables concept reuse across specs AND changes.
    template: inventory-check.md
    instruction: |
      The concept inventory is PROJECT-SCOPED: it lives at
      openspec/concept-inventory.md (NOT in the change directory), sibling of
      the behavioral registry openspec/concepts/. It is a LIVING DOCUMENT:
      per-change copies died with archiving, destroyed the "Introduced By
      spec:X" provenance the schema promises, and forced every change to
      re-scan and excavate the archive to reconstruct history. This artifact
      is the per-change CHECK against it:

      A. If openspec/concept-inventory.md does NOT exist: create it now from
         templates/concept-inventory.md using the scan procedure below.
      B. If it exists: VERIFY it — run the consistency check below against
         the current source; fix stale rows (a row whose package/constraint
         no longer matches the code) preserving their provenance column.
         Do NOT re-create it from scratch: a fresh scan loses which spec
         introduced each concept.
      C. Write THIS change's inventory-check.md (template) recording: the
         consistency-check result, rows fixed, the behavioral-registry pass
         result, and new candidate concepts flagged for human review.

      SCAN PROCEDURE (for creating the project inventory, or spot-verifying):
      1. Prefer the SEMANTIC scanner when available (scala-cli based script
         under `openspec/schemas/verified-scala3/scanner/`, MULTI-MODULE —
         it discovers every `src/` root), because regex
         scanning misses Scala 3 constructs: multiline type aliases, nested objects,
         parameterised enum cases, givens, extension methods, nested packages,
         generated IDL types outside expected paths, typeclass instances, overloads.
         Run: `scanner/scan.sh . --output openspec/concept-inventory.md`
         (creation only — see B for refreshing an existing inventory).
         Fall back to a manual/regex scan only if the scanner cannot run, and say so.
      2. Scan main sources (all modules, per openspec/capability-profile.md) for:
         - `opaque type` declarations → type name, underlying type, constraint, package
         - `sealed trait` / `enum` declarations → name, variants, package
         - Service traits (tagless final or otherwise) → name, methods, package
         - Case classes in domain packages → name, fields, package
         - `given` instances and extension methods on domain types
      3. Scan IDL sources (`*.smithy`, `*.proto`) for services, operations, structures.
      4. Scan test sources for property-generator declarations of the DETECTED
         property framework (e.g. ScalaCheck `Gen[_]`/`Arbitrary[_]`, Hedgehog
         `Gen[_]`).
      5. Record each concept in the tabular format defined in the template.

      CONSISTENCY CHECK — run after scanning and record the result in the inventory:
      - every recorded package path is importable (matches a real `package` clause)
      - every recorded constraint matches the source expression
      - every recorded generator compiles (exists in test sources as recorded)
      Report any discrepancy explicitly rather than silently recording it.

      BEHAVIORAL REGISTRY PASS (if openspec/concepts/ exists) — the type
      inventory above catalogs *types*; the behavioral concept registry at
      openspec/concepts/ catalogs *behavior* (concepts in the Meng & Jackson
      sense: purpose / state / actions / operational principle, plus
      synchronizations). During a scan, run this pass AGAINST the registry
      (do not regenerate it):
      1. Run openspec/schemas/verified-scala3/scanner/registry-check.sh — it
         verifies every Implementation-map symbol against the source tree,
         every declared fold field against its fold file, and every
         Concept/action cited by active change specs against the registry.
         A failing row MUST be fixed as part of the change that moved the code.
      2. Detect new candidate concepts and syncs — flag for human review:
         - a new variant in a persistent entity's command/event enum not in
           any concept's action table
         - a new message consumer handler, producer, or HTTP middleware not
           in any Synchronizations section or the README sync index
         - a new persisted state component not owned by any concept (and for
           state-bearing concepts, verify it is listed in a "maps ..." fold
           declaration)
      3. Record the registry check result in the inventory's "Behavioral
         Concepts (registry pass)" section.

      IMPORTANT: If the project is new or empty, create the project inventory
      with empty tables and header rows only. It will be populated as specs
      are implemented.

      The PROJECT inventory is a LIVING DOCUMENT updated after each spec's
      implementation during the apply phase (Step 12) — provenance
      (`spec:<name>`) accumulates ACROSS changes. The per-change
      inventory-check.md is a snapshot report and is archived with the
      change; the inventory itself never is.
    requires:
      - proposal
      - capability-profile

  - id: specs
    generates: "specs/**/*.md"
    description: >
      Delta specs — one per capability. Each spec declares which domain concepts
      it uses (from the inventory) and which it introduces (new). Includes
      requirements, acceptance scenarios, property-based tests with generator
      strategies, temporal properties, formal contracts, and a proof-obligations
      table mapping every requirement to an enforcement mechanism.
    template: spec.md
    instruction: |
      Create one spec file per capability under `specs/<capability-name>/spec.md`.

      CRITICAL RULES:
      1. Each spec MUST have a "Concepts Used" table referencing entries from
         openspec/concept-inventory.md by name, kind, and package. Do NOT invent types —
         if the concept exists in the inventory, reference it exactly.
      2. Each spec MUST have a "Concepts Introduced" table listing ANY new types,
         enums, traits, or IDL operations this spec will create. These are
         commitments — the implementation must create exactly these concepts.
      3. Requirements use Given/When/Then format. Every requirement MUST open
         with a single normative statement containing SHALL or MUST, placed
         between the `### Requirement:` header and the first `**Given**` clause —
         this is REQUIRED by `openspec validate --strict` (which rejects any
         requirement body lacking SHALL/MUST). The Given/When/Then clauses then
         refine that normative statement into observable, testable form.
         Every `Then` must be observable and every scenario testable. Every error
         path must be specified. Avoid vague words ("valid", "fast", "reasonable",
         "correct") — state the concrete constraint instead.
      4. Every spec MUST include a "Properties (Ring 3)" section with
         property-based tests (in the DETECTED property framework) expressed as
         English descriptions AND `forAll` pseudocode.
         Properties describe invariants, not examples. Good: "deposit increases
         balance by exact amount for all positive amounts and all valid accounts."
         Bad: "depositing 100 into account ABC gives balance 200."
         EVERY property MUST declare its generator strategy (which Gen, whether it
         is constructive or filtered, which edge cases it covers). Prefer
         constructive generators over filtered ones (`suchThat`-style discards
         weaken coverage).
      5. Where relevant to the detected stack, include MODEL-BASED properties:
         - event sourcing: replaying persisted events == live command handling
         - messaging ingestion: malformed payloads → explicit errors; commit only
           after successful processing; duplicate/out-of-order behavior specified
         - DSL/evaluator logic: desugaring laws, typechecker totality, semantics
           agreement with the reference model
         - serialization: round-trip laws per wire format, old-fixture decoding
      6. If the proposal's verification strategy includes Ring 6, include a
         "Formal Contracts" section with require/ensuring pseudocode.
      7. If the proposal's verification strategy includes Ring 9, include a
         "Temporal Properties" section with EARS natural language patterns.
         Every temporal property must name its trigger event and response event.
      8. Every spec MUST include a "Proof Obligations" table mapping EVERY
         requirement, scenario, invariant, and type constraint to its enforcement
         mechanism (type system / smart constructor / property test / scenario
         test / compile-negative test / static rule / adversarial review / manual
         review). A manually-reviewed obligation is allowed but must say so
         explicitly. No spec may enter implementation with an obligation that has
         no declared enforcement mechanism.
      9. Any claim that an invalid state is "unreachable" must cite a type-level
         proof (and a compile-negative test obligation) or an explicit runtime
         check. If a spec extends an enum/GADT, it must state how all existing
         pattern matches over that type should behave for the new variants.
      10. Specs are DELTA specs. Use `## ADDED Requirements` headers for new
          requirements and `## MODIFIED Requirements` for changes to existing ones.
      11. TYPE-WIDENING / ALIAS IMPACT: if a spec changes a public type to an
          alias of another type (or otherwise widens it) and the target type
          has MORE variants/cases than the source, the spec MUST include a
          "Type-Widening Impact" subsection listing every downstream pattern
          match on that type that contains a catch-all/default arm, and state
          how each must behave for the newly-reachable variants (handle
          exhaustively, explicitly reject, or justify). Aliasing to a richer
          type IS an enum extension for this purpose, even though no variant
          is added in source — the reachable variant set still grew.
      12. CONSUMER-FACING SURFACE: if a spec introduces or changes an
          LLM-/caller-facing surface (tool, operation, IDL operation, public
          schema exposed to a model or external consumer), the spec MUST state
          what the consumer observes (e.g. parameter names/types/schema, not
          just name + description) and carry a scenario asserting that surface.
      13. ERROR-VARIANT FEASIBILITY: any requirement whose `Then` asserts a
          specific error variant is returned MUST be type-feasible against the
          producing API's return type — e.g. a handler typed `Either[String, R]`
          cannot carry a structured `ToolCallError`. Resolve the contradiction
          in the spec (amend the requirement or the producing signature); do
          NOT defer it to implementation.
      14. ALTITUDE RULE — if the project has a concept registry
          (openspec/concepts/): requirements and scenarios use behavioral
          vocabulary only (Concept/action references, user-facing surface
          language, new domain terms, test vectors). Code identifiers — module
          names, error classes, build commands — go in the spec's
          "## Implementation Anchors" section, never inside a Given/When/Then.
          Cite touched concepts in "## Concepts Used (behavioral)" with links;
          if the spec alters a concept's actions/state/syncs, state that
          updating the concept file is part of the spec.
      15. ADVERSARIAL RULE — every requirement containing "only", "never", or
          "must not" MUST have at least one scenario whose input the
          requirement forbids. Positive examples alone do not pin a negative
          requirement.
      16. MUST-CONFIRM RULE — any classification table, code mapping, or
          value domain whose authoritative source is outside the repo is
          marked "MUST-CONFIRM — do not invent", with a pointer to the real
          source. Never write invented values into a spec.
      17. CONCURRENCY RULE — any requirement involving concurrent execution,
          timeouts, cancellation, or interruption MUST state its deterministic
          observable (ordering guarantee, final state, emitted-event set) —
          never a wall-clock expectation ("within 100ms"). Its scenarios are
          implemented with the detected deterministic test kit (e.g.
          cats-effect TestControl); if none is available, the proposal must
          carry a setup task or an explicit waiver.
    requires:
      - proposal
      - capability-profile
      - concept-inventory

  - id: spec-lint
    generates: spec-lint.md
    description: >
      Lint report over all specs: ambiguity, testability, concept resolution,
      generator strategies, proof-obligation completeness. Fails fast if any
      spec is too ambiguous to implement safely.
    template: spec-lint.md
    instruction: |
      STEP 0 — MECHANICAL PRE-PASS (before any judgment):
      1. Run `openspec validate --strict` for the change — it must pass.
      2. Run `openspec/schemas/verified-scala3/scanner/spec-lint.sh <change-dir>`
         — it mechanically enforces the greppable subset of the checks below
         (SHALL/MUST placement, scenario presence for only/never/must-not
         requirements, generator-strategy lines, Proof-Obligations presence,
         temporal trigger/response lines) and reports vague-word candidates.
         Its FAILs are lint FAILs; paste its summary into the report.
      The judgment checks (observability, testability, type-feasibility,
      altitude) remain below — the script does not replace them.

      Lint EVERY spec file under `specs/` against these checks and record one
      row per check per spec in the report:

      1. Every requirement has concrete Given/When/Then clauses.
      1b. Every requirement opens with a normative statement containing SHALL or
         MUST before its `**Given**` clause (FAIL otherwise — `openspec validate
         --strict` rejects requirements without SHALL/MUST).
      1c. Every requirement that asserts "identical/same/preserved behavior"
         over an enum/dispatch parameter (e.g. a deprecated factory delegating
         per-trigger) is backed by at least one scenario PER enum variant, each
         asserting the discriminating observable (which inputs trigger which
         behavior), not just an aggregate like a call count. FAIL if only one
         variant is covered.
      2. Every `Then` is observable (a return value, persisted event, emitted
         message, error value — not an internal intention).
      3. Every scenario is testable with the detected stack (openspec/capability-profile.md).
      4. Every error path is specified (no requirement leaves failure behavior open).
      5. Every new public concept appears in "Concepts Introduced".
      6. Every reused concept exists in openspec/concept-inventory.md.
      7. Every property has a declared generator strategy.
      8. Every temporal property has a trigger event and a response event.
      9. No vague words ("valid", "fast", "reasonable", "correct", "appropriate")
         without a concrete definition next to them.
      10. Every "unreachable"/"cannot happen" claim has a type-level proof
          obligation or an explicit runtime check.
      11. Every enum/GADT extension states how existing pattern matches behave.
          NOTE: aliasing a public type to a richer type (more variants) counts
          as an extension — check 11 FAILS if the spec's "Type-Widening Impact"
          subsection (specs rule 11) is absent or incomplete.
      12. The Proof Obligations table covers every requirement, scenario,
          invariant, and introduced type constraint, each with a declared
          enforcement mechanism.
      13. Every consumer-facing surface (tool/operation/IDL) has a scenario
          asserting what the consumer observes (parameter schema, not just
          presence/name). (specs rule 12.)
      14. Every requirement asserting a specific returned error variant is
          type-feasible vs the producing API's return type. (specs rule 13.)
          A `Then` of "Left(ToolCallError.InvalidArguments(...))" produced by
          a handler typed `Either[String, R]` FAILS until resolved.
      15. ADVERSARIAL RULE — every requirement containing "only", "never", or
          "must not" has at least one scenario whose input the requirement
          forbids. (specs rule 15.) Positive examples alone do not satisfy a
          negative requirement — FAIL if no adversarial scenario exists.
      16. MUST-CONFIRM RULE — every classification table, code mapping, or
          value domain whose authoritative source is outside the repo is
          marked "MUST-CONFIRM" with a pointer to the real source. (specs
          rule 16.) Invented plausible values FAIL — the apply phase cannot
          proceed on fabricated data.
      17. ALTITUDE RULE (if openspec/concepts/ exists) — no Given/When/Then
          clause contains code identifiers (module names, error class names,
          build commands). These belong in "## Implementation Anchors".
          Cited concepts in "## Concepts Used (behavioral)" link to registry
          files. (specs rule 14.)
      18. CONCURRENCY RULE — every requirement/scenario about concurrent
          behavior names a deterministic observable and is testable with the
          detected deterministic test kit. (specs rule 17.) A wall-clock
          timing assertion ("completes within N ms") FAILS — restate as a
          deterministic ordering/state observable.

      VERDICT: each spec gets PASS / FAIL. A FAIL lists the exact offending
      headings and what is missing. Do NOT proceed to implementation-order while
      any spec is FAIL — fix the specs first, then refresh this report.
    requires:
      - specs

  - id: design
    generates: design.md
    description: >
      Technical design covering architecture decisions, package structure,
      effect boundaries, type-driven invalid-state prevention, refined-type
      strategy, IDL model layout, compatibility story, and verification
      approach per module.
    template: design.md
    instruction: |
      Write a technical design document for this change. The design must cover:

      1. PACKAGE STRUCTURE: Which packages will contain domain types, service traits,
         infrastructure, and test code. Specify layer dependency rules that the
         architecture rules (Ring 2) will enforce, made PROJECT-SPECIFIC from
         openspec/capability-profile.md — e.g. pure domain packages must not import the
         detected actor framework, protobuf runtime, HTTP, messaging, or database
         client libraries; actor/runtime layers may; endpoint layers may import
         HTTP and generated API models; generated code is excluded from some checks.

      2. EFFECT BOUNDARIES: Which code is pure (candidates for Ring 6 formal
         verification) and which is effectful. Actor/state-transition logic should
         delegate to pure functions wherever possible.

      3. TYPE STRATEGY — INVALID-STATE PREVENTION: For every invariant, place it on
         this hierarchy and justify the placement:
           Best:  invalid state is impossible to express (narrow enums/ADTs,
                  indexed ADTs/GADTs, separate raw vs typed ASTs)
           Good:  invalid state is rejected by smart constructor
           Okay:  invalid state is rejected by validator
           Risky: invalid state reaches the evaluator and returns a fallback
           Bad:   invalid state silently maps to valid behavior  ◄ FORBIDDEN
         Prefer splitting broad enums into narrower algebras over validating a
         broad enum downstream. For DSL code prefer a raw → typecheck → typed
         pipeline where only the typechecker can produce the typed AST.
         When something must not be constructible, add a compile-negative test
         obligation (e.g. `assertDoesNotCompile`).

      4. REFINED TYPE STRATEGY: Which domain values get constrained opaque types
         (Iron or the detected refined-type library) vs. plain case classes.
         Rule of thumb: any value that crosses an API boundary or is persisted
         should have a constrained opaque type.

      5. IDL MODEL LAYOUT: If the change involves API operations, describe the
         Smithy/protobuf service/operation structure per the detected IDL stack.

      6. ERROR STRATEGY: How errors are modeled (sealed enum per service), how they
         flow through the system, and how they are exposed at boundaries. No
         swallowed errors; no default branches returning valid domain values.

      7. COMPATIBILITY STORY (Ring 4): If the change touches persisted or wire
         data, state how compatibility is preserved and tested: old-fixture
         decoding, snapshot compatibility, round-trip laws per format, unknown/
         missing-field behavior, schema evolution checks.

      8. VERIFICATION MAP: For each module/package, state which rings apply and why.
         This feeds directly into the implementation-order artifact.

      Reference openspec/concept-inventory.md for existing patterns. Extend existing
      approaches rather than inventing parallel ones.
    requires:
      - proposal
      - capability-profile
      - concept-inventory
      - spec-lint

  - id: implementation-order
    generates: implementation-order.md
    description: >
      Ordered list of specs with dependency analysis, determining the
      depth-first implementation sequence. Each spec entry lists concepts
      introduced, concepts consumed, applicable rings, complexity, and the
      typed-contract requirement (full / minimal / waiver).
    template: implementation-order.md
    instruction: |
      Analyze all specs and produce a dependency-ordered implementation sequence.

      PROCEDURE:
      1. For each spec file in `specs/`, extract:
         - Concepts Introduced (from the spec's table)
         - Concepts Used (from the spec's table)
         - Applicable Rings (from the proposal's verification strategy + spec's sections)
         - Complexity: simple (no new types, ≤1 new method), medium (new types OR
           complex logic), high (new types AND complex logic AND Ring 6/7/9)

      2. Build a dependency graph: spec A depends on spec B if A uses a concept
         that B introduces.

      3. Topologically sort the specs. If two specs are independent, order the
         simpler one first (faster feedback, builds confidence).

      4. For each spec, record the TYPED CONTRACT requirement from the proposal's
         decision table: full / minimal / waiver. The typed contract is MANDATORY
         for every code-changing spec — "waiver" requires explicit human approval
         and applies only to docs/formatting/test-only specs.

      5. For each spec, record which production files are expected to change —
         this drives Ring 5 dynamic mutation targeting.

      5b. For each spec, record the HUMAN GATE TIER: `combined` (typed
          contract + test oracle presented at ONE gate) is allowed ONLY when
          the spec's complexity is `simple` AND the proposal's correctness
          risk is `low`; everything else is `separate` (two gates — the
          default). Both steps are always executed in full either way; the
          tier changes only how many stops the human reviews. Rationale:
          human attention is the scarcest verification resource — a gate the
          human stops reading is worse than no gate.

      6. Create a checkbox list for tracking implementation progress. This list
         is the `tracks` target for the apply phase — progress is measured by
         checkbox completion.

      IMPORTANT: The order determined here is the EXACT order the apply phase will
      follow. Each spec is fully implemented and verified before the next begins.
    requires:
      - specs
      - spec-lint
      - design

  - id: tasks
    generates: tasks.md
    description: >
      Stock OpenSpec task checklist for the change, derived from
      implementation-order.md. Makes `openspec list` / task tooling report
      progress. This is the OpenSpec-native companion to the schema's richer
      implementation-progress.md tracker.
    template: tasks.md
    instruction: |
      Generate a `tasks.md` checklist in the change root from the sequence in
      implementation-order.md. This file exists so the stock OpenSpec CLI
      (`openspec list`, task counts, `openspec validate`) can track progress;
      the apply phase still tracks its detailed state in implementation-progress.md.

      PROCEDURE:
      1. Emit one `## <n>. <spec-name>` section per spec, in the EXACT order of
         implementation-order.md's Implementation Sequence.
      2. Under each section, emit `- [ ]` checkbox tasks covering the schema's
         per-spec cycle: typed contract (human gate), test oracle (human gate),
         implementation, the applicable rings for THAT spec (from the Ring
         Applicability table — do not list rings marked `—`), and the
         concept-delta + inventory update + checkpoint.
      3. If a spec carries prerequisite work (e.g. build restructure, new
         dependencies, static-analysis config), add those as the first checkboxes
         of its section.
      4. Keep every task observable and specific to the detected stack — never a
         generic "implement the spec".

      implementation-progress.md is the SINGLE SOURCE OF TRUTH for progress.
      Both files are seeded unchecked; at each checkpoint (apply Step 13) the
      apply phase updates implementation-progress.md and then REGENERATES
      tasks.md's checkboxes from it — tasks.md is derived output, never
      hand-maintained in parallel (dual hand-maintained trackers drift).
    requires:
      - implementation-order

apply:
  requires:
    - implementation-order
  tracks: implementation-progress.md
  instruction: |
    ███████████████████████████████████████████████████████████████████████████
    ONE SPEC AT A TIME — MANDATORY HUMAN GATE BETWEEN EVERY SPEC
    ███████████████████████████████████████████████████████████████████████████

    This schema implements a STRICT one-spec-at-a-time discipline with
    verification moved EARLIER: types and tests are designed before the
    implementation, so they act as an oracle derived from the specification,
    not a mirror of the generated code.

    The cycle is: implement ONE spec → checkpoint → WAIT → human approves → next spec.

    BEFORE YOU WRITE A SINGLE LINE OF CODE, read and internalize this rule:

      After completing ALL steps for a spec (Steps 0–13), you MUST stop,
      present the checkpoint summary, and WAIT for the human to explicitly
      say "continue", "next", "proceed", or similar.

      Moving to the next spec without explicit human approval is a schema
      violation. It defeats the purpose of the verified workflow.

      "I'll just do the next one since it's simple" is NOT acceptable.
      "The user said continue earlier, so I'll keep going" is NOT acceptable.
      Each spec requires its own approval. No exceptions.

    There are also TWO human gates INSIDE each spec: after the typed contract
    (Step 1) and after the test oracle (Step 2). Do not implement until both
    have been approved.

    GATE TIERING — implementation-order.md records a HUMAN GATE TIER per spec:
    when the tier is `combined` (allowed only for complexity=simple AND
    proposal risk=low), Steps 1 and 2 are still BOTH executed in full, but
    their outputs are presented together at a single gate after Step 2.
    All other specs keep the two separate gates. Tiering spends human
    attention where the risk is — it never skips work, only merges stops.

    ███████████████████████████████████████████████████████████████████████████

    Read openspec/capability-profile.md FIRST — every command, framework choice, and
    test style below must match the DETECTED stack, not an assumed one.
    Read implementation-order.md to determine the sequence.
    Then implement ONE spec — the first pending one — following Steps 0–13 below.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 0 — BASELINE + CONCEPT CHECK
    ═══════════════════════════════════════════════════════════════════════════
    BASELINE — record this spec's starting point FIRST:
    - The working tree must be clean (the previous spec's Step 13 commit is
      its checkpoint identity). If uncommitted changes exist, STOP and
      resolve with the human — do not start a spec on a dirty tree.
    - Record `git rev-parse HEAD` as the BASELINE SHA in
      implementation-progress.md. Every diff this spec's rings compute
      (Ring 1 danger scan, Ring 5 mutation targeting, Ring 8 review diff,
      Step 12 deltas) is `git diff <baseline>` — never the unanchored
      working-tree diff, which after spec 1 contains other specs' changes.
    - INVENTORY SNAPSHOT: run the semantic scanner into
      `openspec/changes/<change>/inventory-snapshots/<spec>-before.md`.
      Step 12 re-runs it and machine-diffs the two.

    Read openspec/concept-inventory.md. For every type, trait, enum, or IDL model
    that this spec's "Concepts Used" table references:
    - Verify the concept exists in the project source code
    - Import it — do NOT recreate it
    If the spec extends an existing concept (adds an enum variant, a new method
    to a service trait), modify the existing source file rather than creating a
    parallel version.

    Also verify the spec's Proof Obligations table is complete: every
    requirement, scenario, invariant, and type constraint has a declared
    enforcement mechanism. If not, STOP — the spec must be fixed first.

    PUBLIC-TYPE-CHANGE IMPACT SCAN — run when the spec aliases, widens, or
    changes the variant set of a PUBLIC type (see design.md + the spec's
    "Type-Widening Impact" subsection, specs rule 11). This closes the
    structural blind spot where aliasing to a richer enum silently widens
    every downstream catch-all match WITHOUT any file edit:
    - For every public type whose effective variant set grew, grep the WHOLE
      module graph (not just the change's diff) for pattern matches on that
      type containing a catch-all/default arm (`case other =>`, `case _ =>`,
      `case _: T =>`).
    - For each such site, require one of, recorded in the spec's Proof
      Obligations: made exhaustive over the new variant set; explicitly rejects
      the new variants; or a justified `case` with rationale.
    - Record the scan result (sites found + resolution) in the checkpoint.

    REGISTRY GATE (if openspec/concepts/ exists) — BLOCKING:
    a. Run openspec/schemas/verified-scala3/scanner/registry-check.sh — it
       must pass before you write code. A stale Implementation-map row means
       the spec's ground truth has drifted: fix the map first.
    b. For every concept the spec cites in "Concepts Used (behavioral)",
       open its concept file and verify each state component and action the
       spec RELIES ON is actually realized: read the fold/handler the
       Implementation map points to — a field declared on a model shape but
       never populated by the fold is NOT available. If a spec assumption
       contradicts the concept file or the code, STOP and report the
       discrepancy instead of implementing on top of it.
    c. For every spec item marked MUST-CONFIRM: STOP and ask the human for
       the authoritative data. Do NOT synthesize plausible values —
       fabricated tables, codes, or mappings are a schema violation even if
       every test passes.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 1 — TYPED CONTRACT ◄ MANDATORY — GENUINELY COMPILED
    ═══════════════════════════════════════════════════════════════════════════
    Read the typed-contract requirement for this spec from implementation-order.md
    (full / minimal / waiver). A waiver requires explicit human approval.

    1. Generate a compile-only typed contract containing:
       - Import statements for reused concepts (exact packages from inventory)
       - New domain types: opaque/refined declarations, ADTs/enums/GADTs
       - Public method signatures and service/actor command signatures (`???` bodies)
       - The error algebra (sealed error types, new variants on existing ones)
       - Smart constructors for constrained types
       - Compile-negative examples as comments or `assertDoesNotCompile` stubs
         where the spec says something must not be constructible
       - Property and generator obligations as structured comments
       - Formal contract sketches and temporal monitor sketches where relevant

    2. PLACEMENT — the file MUST be part of the real sbt source graph so that
       compiling it gives genuine type-level evidence. Files under
       `openspec/changes/...` are NOT compiled by sbt and give FALSE confidence.
       Place the contract under the owning module's TEST sources, e.g.
       `<module>/src/test/scala/<pkg>/typecontract/<SpecName>TypeContract.scala`
       (or a dedicated type-contracts module if the project has one — see
       openspec/capability-profile.md).

    3. Compile it with the real project classpath:
       `sbt <module>/Test/compile`
       Fix until it genuinely compiles.

    4. STOP. Present the typed contract for human review (new types, signatures,
       error algebra, properties). Wait for explicit approval.
       (Combined-tier specs only — per implementation-order.md's gate tier:
       do not stop here; carry the contract presentation into the single
       combined gate at the end of Step 2.)

    ═══════════════════════════════════════════════════════════════════════════
    STEP 2 — TEST ORACLE ◄ TESTS BEFORE IMPLEMENTATION
    ═══════════════════════════════════════════════════════════════════════════
    Generate the tests, properties, and model tests for this spec NOW — from the
    SPEC and the approved typed contract ONLY, before any implementation exists.
    Tests written after the implementation tend to mirror it; tests written from
    the spec are an independent oracle.

    Use the `openspec-property-tests` skill (it detects the test framework from
    openspec/capability-profile.md — e.g. ScalaTest + ScalaCheck, munit + ScalaCheck,
    or munit + Hedgehog — and reads implementation-order.md /
    implementation-progress.md; tasks.md is derived output, not an input).

    Requirements (also enforced by the skill):
    - One test per Scenario, named after the scenario heading
    - One property per "Properties (Ring 3)" invariant, with the generator
      strategy declared in the spec; prefer constructive generators; use the
      detected framework's classification/coverage facility (Hedgehog
      `cover`/`classify`, ScalaCheck `classify`/`collect`) so coverage of
      important cases is visible. Where the framework supports coverage
      ASSERTIONS (Hedgehog `cover` fails when a label's percentage is unmet),
      conditioned/filtered properties MUST carry one — a property whose
      antecedent is rarely generated passes vacuously.
    - Model-based tests where the spec declares them (event-sourcing replay,
      messaging ingestion, DSL semantics, serialization round-trips)
    - Actor scenarios use the detected test kits (ActorTestKit, BehaviorTestKit,
      PersistenceTestKit, TestProbe) — never deferred to "integration testing"
    - CONCURRENCY ORACLE — scenarios involving concurrency, timeouts,
      cancellation, or interruption use the detected deterministic test kit
      (e.g. cats-effect TestControl): assert deterministic observables
      (ordering, final state, emitted events), never wall-clock timing;
      `sleep`-and-hope tests are forbidden. TAG these tests (naming
      convention or framework tag recorded in the profile) so Step 6 can
      repeat-run them.
    - Every test cites its source: `// spec: <spec-name> — Scenario: <heading>`
    - Compile-negative obligations become `assertDoesNotCompile` tests
    - The tests must COMPILE against the typed contract (`sbt <module>/Test/compile`).
      They are EXPECTED TO FAIL at runtime until Step 3 — that is the point.
    - ORACLE FAITHFULNESS — a test asserting a spec-named error variant MUST
      assert that variant exactly. Do NOT loosen an error assertion with
      `.toString.contains(...)` / `message.contains(...)` / `||` substring
      fallbacks to accommodate the implementation; if the implementation
      cannot produce the named variant, the spec or the producing signature
      must change (re-approved at this gate), NEVER the oracle. Substring /
      `contains` checks are acceptable only for human-readable message text,
      never as a substitute for the structured variant the scenario names.
    - GENERATOR FAITHFULNESS — generators are PART OF the approved oracle.
      Narrowing a generator's domain after approval (adding a filter/
      `suchThat`, tightening a `Range`, dropping an edge case, replacing a
      constructive generator with a narrower one) is oracle tampering exactly
      like loosening an assertion, and requires explicit human re-approval.
      During Step 6's fix iterations the IMPLEMENTATION changes — never the
      generators.
    - BEHAVIOR-PRESERVATION COVERAGE — for a requirement asserting
      identical/same behavior over an enum/dispatch parameter, generate one
      scenario test PER variant (spec-lint check 1c), each asserting the
      discriminating observable, not just an aggregate call count.

    Produce the coverage cross-reference tables (they will be re-verified in
    Step 6):

      A) Requirement/Scenario ↔ Test:
        | Spec Heading | Test Name | Status |

      B) Concept coverage — every concept in "Concepts Used" and "Concepts
         Introduced" must appear in executable test code (import, type
         annotation, constructor, pattern match, or generator type — comments
         do NOT count):
        | Concept | Source | Test Reference | Status |

      C) Proof obligations — every obligation whose mechanism is a test must
         name the test that enforces it:
        | Obligation | Enforcement | Test/Artifact | Status |

    ORACLE POLARITY — prove the oracle CAN fail before trusting it. After the
    oracle compiles, RUN it once now (before any implementation) and classify
    every new test in a polarity table:
      - RED — asserts new behavior; MUST fail at this run. A red-classified
        test that passes pre-implementation is a broken oracle (vacuous,
        tautological, or asserting already-existing behavior) — fix it
        BEFORE the gate; it is currently proving nothing.
      - GREEN-BY-DESIGN — behavior-preservation/regression tests for
        refactors; MUST pass at this run (against the OLD code) and still
        pass after Step 3. Their pre-implementation pass IS their evidential
        value — record it.
    A test that cannot be classified does not enter the oracle. The polarity
    table (| Test | Polarity | Pre-impl result |) is part of the gate
    presentation and is re-checked in Step 6.

    STOP. Present the test oracle (property inventory + polarity table +
    coverage tables) for human review. Wait for explicit approval before
    implementing. (Combined-tier specs: this is the SINGLE gate — present the
    Step 1 typed contract together with the oracle here.)

    ═══════════════════════════════════════════════════════════════════════════
    STEP 3 — RING 0: IMPLEMENTATION + COMPILATION
    ═══════════════════════════════════════════════════════════════════════════
    Generate the full Scala 3 implementation to satisfy the approved typed
    contract and test oracle.
    - Keep all approved type declarations and signatures exactly as approved
    - Import reused concepts from the inventory — do NOT recreate them
    - Implement all method bodies; promote contract declarations from the
      typed-contract file into their real main-source locations
    - CONTRACT → API CONFORMANCE ASSERTION: after promotion, the typed-
      contract file is NOT gutted — convert it into a permanent conformance
      test: for each approved public signature keep an eta-expanded pin, e.g.
        val transferSig: (AccountId, AccountId, Amount)
          => IO[Either[TransferError, TransferResult]] = AccountService.transfer
      plus the compile-negative checks. It compiles forever at zero runtime
      cost, and any later signature drift breaks `Test/compile` — "keep
      signatures exactly as approved" is otherwise unverified prose.
    - Ensure all pattern matches are exhaustive (sealed types); NO `case _`
      fallbacks in domain logic that map invalid input to valid behavior
    - EXHAUSTIVENESS ESCALATION: if openspec/capability-profile.md records that fatal
      warnings are NOT active, compile with the profile's recorded escalation
      (e.g. `-Wconf:name=PatternMatchExhaustivity:e,name=MatchCaseUnreachable:e`)
      — an inexhaustive match over a sealed type must FAIL Ring 0, not warn.
    Run main AND test compilation (commands from openspec/capability-profile.md):
      `sbt <module>/compile <module>/Test/compile`
    If compilation fails, read the errors, fix them, and re-compile.
    Maximum 3 iterations. If still failing, STOP and present errors to human.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 4 — RING 1: LINT + STATIC CORRECTNESS RULES
    ═══════════════════════════════════════════════════════════════════════════
    Run: `sbt "scalafix --check"` (plus `scalafmtCheckAll` / WartRemover if
    active per openspec/capability-profile.md).
    Fix any DisableSyntax violations (var, null, throw, return, while).
    Fix any RemoveUnused violations.

    Additionally scan for dangerous correctness patterns: run
      `openspec/schemas/verified-scala3/scanner/danger-scan.sh <baseline-SHA>`
    (baseline from Step 0). It reports candidate occurrences in the spec's
    production diff; pass importers of widened types (from the Step 0
    PUBLIC-TYPE-CHANGE IMPACT SCAN) via `--also <file>...` — catch-all
    matches in those importers silently change behavior with no edit.
    Every reported candidate must be REMOVED or JUSTIFIED — a justified line
    carries a `// danger-scan:allow <reason>` comment, so "clean" is the
    script exiting 0, not memory. (Manual grep fallback if the script cannot
    run — same patterns:)
    - `.get` on Option/Either/Try; unsafe `head`/`tail`/`last`
    - `case _` / `case other` in critical ADT/evaluator/typechecker/conversion
      matches — ESPECIALLY a catch-all that constructs a VALID domain value
      from an unrecognized variant (e.g. `case other => UserMessage(...)`)
    - `@unchecked`, unchecked casts, `asInstanceOf`
    - `Await`, `Thread.sleep`, swallowed `NonFatal`
    - comments claiming "unreachable" without a type-level proof
    - `scalafix:off` without justification
    Re-run until clean. Maximum 2 iterations.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 5 — RING 2: ARCHITECTURE
    ═══════════════════════════════════════════════════════════════════════════
    Run the architecture rules configured for the project (see design.md and
    openspec/capability-profile.md), e.g.:
    - LayerDependencies: pure domain must not import the detected actor
      framework, protobuf runtime, HTTP, messaging, or database client libraries
    - SealedDomainTypes: domain traits/abstract classes must be sealed
    - EffectDiscipline: service methods return the project's effect type
    - RawPrimitivesInDomain: no raw String/Int/Long in domain public APIs
    - ErrorHandlingDiscipline: no Try, sealed error types, no swallowed errors
    - ExhaustiveDomainConversion: pattern matches that convert or construct
      domain values (e.g. over Message/Role/enum) must be exhaustive or
      explicitly reject; a catch-all that maps an unrecognized variant to a
      VALID domain value is a violation (pairs with the Ring 1 grep)
    Generated code is excluded where the design says so.
    Fix violations. Re-run until clean.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 6 — RING 3: RUN THE TEST ORACLE ◄ MANDATORY — NO EXCEPTIONS
    ═══════════════════════════════════════════════════════════════════════════
    Ring 3 is MANDATORY for every code-changing spec. The only waivers (stated
    in the proposal, human-approved) are docs-only, formatting-only,
    build-metadata-only, and test-only changes. Refactorings still require
    regression/property tests proving behavior preservation.

    The tests were written in Step 2. Now run them:
      `sbt <module>/test`

    If a property is falsified, read the counterexample, RECORD THE SEED
    (the profile records the framework's seed mechanism), fix the
    IMPLEMENTATION (NOT the property and NOT its generators — both are the
    approved oracle; see ORACLE FAITHFULNESS and GENERATOR FAITHFULNESS in
    Step 2), then re-run first with the seed fixed to confirm the fix, then
    unseeded.
    If a test itself is wrong against the spec, fixing it requires re-approval
    of the test oracle by the human (it was an approved artifact).
    Maximum 3 iterations; then STOP and present the counterexample + seed.

    POLARITY CONFIRMATION — every test classified RED in Step 2 must now be
    green (red → green is the implementation evidence); every GREEN-BY-DESIGN
    test must still be green. Record the confirmation.

    FLAKE DISCIPLINE — run the concurrency-tagged tests (Step 2) N=20 times
    (a loop or the framework's repetition facility). ANY intermittent failure
    is a Ring 3 FAILURE to fix (record the seed/interleaving), never noise to
    re-run away.

    CROSS-MODULE REGRESSION — after the owning module is green, run the test
    suites of every module that depends on it (module graph from
    openspec/capability-profile.md; when the full aggregate suite is cheap, run it
    all). A change in a core module can break downstream modules with no
    type-widening involved — a checkpoint presented on owning-module green
    alone is a schema violation.

    Re-verify the three cross-reference tables from Step 2 (Requirement/Scenario,
    Concept coverage, Proof obligations). Zero ❌ rows may remain.

    SPEC UPDATE — mandatory documentation output at end of Ring 3:
    1. Update the current spec markdown file and create (or refresh) a
       `## Requirement ↔ Test Cross-Reference` table, placed after
       `## Properties (Ring 3)` content and before `## Verification Rings`.
    2. One row per Requirement/Scenario with | Requirement | Test Name | Status |,
       in spec declaration order, all ✅.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 7 — RING 4: WIRE/PERSISTENCE COMPATIBILITY (if applicable)
    ═══════════════════════════════════════════════════════════════════════════
    Applies if the spec touches serialization, persisted events/snapshots, wire
    formats, or message payloads. Verify and test:
    - round-trip per format: JSON, protobuf, Smithy codec — encode→decode == id
    - old persisted fixtures still decode to the expected domain values
      (old fixture bytes/json → decode → expected event/state)
    - snapshot compatibility
    - unknown/missing-field behavior on inbound payloads matches the spec
    If fixtures don't exist yet, create them from current encodings so future
    changes have a compatibility baseline.
    If not applicable: skip, noting why.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 8 — RING 8: ADVERSARIAL SPEC-COMPLIANCE REVIEW ◄ MANDATORY
    ═══════════════════════════════════════════════════════════════════════════
    Tests can pass while the implementation still violates the English spec
    (e.g. a private helper silently maps an invalid operator to a valid one).
    This ring hunts for exactly that.

    POSITION — Ring 8 deliberately runs BEFORE the expensive rings (5/6/7):
    it is cheap (reading), it frequently changes code and adds tests, and
    mutation must run on final code — its added tests also kill mutants, so
    the mutation score recorded in Step 9 is the true one.

    FRESH-CONTEXT MANDATE — the review MUST be performed by a reviewer with
    NO implementation context: a fresh session/subagent whose only inputs are
    (a) the spec, (b) the approved typed contract, and (c) the diff against
    the Step 0 baseline SHA — explicitly NOT the conversation that produced
    the code. Self-review by the author context is the confirmation-bias
    setup this ring exists to defeat. Use the `openspec-adversarial-review`
    skill in that fresh context, or have the fresh reviewer perform manually:

    1. Compare EVERY requirement against the implementation diff, requirement
       by requirement — including private helpers, not only public behavior.
    2. Search the diff for dangerous patterns:
       fallback/default mappings; `case _` in critical domain logic; comments
       saying "unreachable"; partial functions; `.get`; unchecked casts;
       `@unchecked`; swallowed errors; default branches returning valid domain
       values.
    3. Ask: can public APIs construct invalid states? Exercise direct
       construction paths, not just the happy pipeline.
    4. Ask: could the code pass the current tests while violating the spec?
       If yes, add the missing test or type-level prevention.
    5. Check negative paths directly.

    OUTPUT — a compliance report, one verdict per requirement:
      - Requirement A: PASS
      - Requirement B: PARTIAL — <public behavior passes, helper violates ...>
      - Requirement C: FAIL — <direct construction path missing>

    NO checkpoint may be presented as complete while any requirement is FAIL,
    or PARTIAL without explicit human approval. Fix (re-running Rings 0–4 as
    affected) before proceeding to the expensive rings below.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 9 — RING 5: MUTATION TESTING — DYNAMICALLY TARGETED (if available)
    ═══════════════════════════════════════════════════════════════════════════
    If the mutation tool is available (openspec/capability-profile.md):
    1. Compute the production files changed by THIS spec:
       `git diff --name-only <baseline-SHA>` (baseline from Step 0 — the
       per-spec commit discipline guarantees this diff contains ONLY this
       spec; an unanchored working-tree diff after spec 1 does not).
    2. Generate/override the Stryker `mutate` list to target exactly those
       files. NEVER rely on a fixed `mutate` list in `stryker4s.conf` — a fixed
       list lets changes outside it pass Ring 5 without being mutated.
       Restore the original config afterwards.
    3. Thresholds by module criticality:
       - pure domain / evaluator / typechecker / mapper logic: 90–95%
       - effectful adapters: 80–90%
       - generated or thin wiring code: lower or explicitly skipped
    4. For EVERY surviving mutant, one of (record which):
       - killed by a new targeted test (cite it in the cross-reference table
         with `// spec: <spec-name> — Requirement: <description>`)
       - marked equivalent with an explanation
       - explicitly excluded with rationale
    Maximum 2 iterations. If not available: skip, noting the correctness
    impact (and run the fallback coverage tool if the profile records one).

    ═══════════════════════════════════════════════════════════════════════════
    STEP 10 — RING 6: FORMAL VERIFICATION / RING 7: MODEL CHECKING (if applicable)
    ═══════════════════════════════════════════════════════════════════════════
    Ring 6 — only for specs whose "Formal Contracts" section is non-empty AND
    whose implementation is pure (PureScala subset). Good candidates: truth
    tables, interval/count semantics, desugaring on small ASTs, totality of
    pure validators, pure state transitions, money arithmetic, monotonicity/
    conservation laws.
    Run: `stainless <relevant pure files>` and fix the implementation to
    satisfy contracts (not the other way around).

    Ring 7 (optional) — for distributed/event-driven invariants that unit
    tests cannot establish (event ordering, at-least-once, idempotency, replay
    == live state, response emitted only after persistence): if the change's
    design declares such invariants, write or update the TLA+/Apalache model
    and run the checker. If no model checker is available, record the invariant
    as a manually-reviewed proof obligation.

    If neither applies: skip, noting why.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 11 — RING 9: TELEMETRY / RUNTIME VERIFICATION (if applicable)
    ═══════════════════════════════════════════════════════════════════════════
    Only for specs whose "Temporal Properties" section is non-empty AND the
    telemetry stack exists per openspec/capability-profile.md. If the stack is absent,
    either add explicit setup tasks (human decision) or skip with a stated
    correctness impact.

    For every temporal property:
    1. Add span/event instrumentation with domain-specific attributes
    2. Generate a runtime monitor from the EARS pattern
    3. Add an offline/integration test feeding the monitor VALID and INVALID
       traces and asserting its verdicts
    4. Wire the feedback loop: a production violation should yield a captured
       trace fixture → a regression test → a candidate OpenSpec change.

    ═══════════════════════════════════════════════════════════════════════════
    STEP 12 — CONCEPT DELTA CHECK + UPDATE INVENTORY
    ═══════════════════════════════════════════════════════════════════════════
    CONCEPT DELTA CHECK — verify the public concept surface changed EXACTLY as
    committed:
      new public surface = previous inventory + Concepts Introduced + approved extensions
    MECHANICAL: re-run the semantic scanner into
    `openspec/changes/<change>/inventory-snapshots/<spec>-after.md` and diff
    it against the Step 0 `-before` snapshot — that diff IS the concept
    delta; compare it line-by-line against the spec's Concepts Introduced
    table + approved extensions (eyeballing the code diff is the fallback,
    not the method). If anything extra was introduced, either:
    1. update the spec and get human approval; or
    2. remove the extra concept.
    This prevents scope creep.

    BUILD-DEPENDENCY DELTA — the concept delta pins the TYPE surface; this
    pins the DEPENDENCY surface. Run
      `git diff <baseline-SHA> -- build.sbt project/`
    (adjust paths to the detected build layout). Any NEW library dependency
    is an unreviewed behavior source: it must be named in the proposal or
    design (or get explicit human approval at the checkpoint) — otherwise
    remove it. Record the delta (or "none") for the checkpoint.

    REMOVAL AUDIT — for every field/type REMOVED from a refactored concept
    (e.g. a case class field deleted during a storage collapse), grep main
    sources for now-orphaned dependents (traits, opaque adapters, extension
    methods, helper factories that existed only to serve the removed member).
    Each orphan MUST be deleted in this change or explicitly retained with
    rationale. `RemoveUnused` lint does not flag public/opaque members, so
    this audit is mandatory.

    Then append the verified NEW concepts to openspec/concept-inventory.md —
    the PROJECT-scoped living inventory: provenance (`spec:<change>/<spec>`)
    accumulates across changes, so the next change inherits it instead of
    re-scanning and excavating the archive:
    - New opaque types with their constraints
    - New enum variants added to existing enums (modify existing rows)
    - New methods added to existing service traits (modify existing rows)
    - New IDL operations
    - New property generators
    Use ACTUAL source details (package, constraint), not planned ones.

    REGISTRY UPDATE (if openspec/concepts/ exists): if this spec altered a
    concept's actions, state, or synchronizations, update the corresponding
    openspec/concepts/*.md file NOW — state declaration, action cases,
    Implementation map rows, sync blocks, deviations. If the spec added or
    changed a state component, keep the fold row's "maps f1, f2, ..."
    declaration in step with the fold's actual field list (exact field
    names — registry-check verifies each against the fold's file). Keep the
    map's symbols exact and re-run scanner/registry-check.sh: it must pass,
    including its spec-reference lint over this change's specs. An
    implementation whose concept files are stale is not complete.

    ███████████████████████████████████████████████████████████████████████████
    STEP 13 — MANDATORY CHECKPOINT ◄ YOU MUST STOP HERE
    ███████████████████████████████████████████████████████████████████████████

    Mark the spec's checkbox in implementation-progress.md (- [ ] → - [x]),
    then REGENERATE tasks.md's checkboxes from implementation-progress.md
    (single source of truth — see the tasks artifact) so the stock OpenSpec
    CLI (`openspec list`) reflects the same progress.

    COMMIT — create this spec's commit NOW: all production, test, and
    change-artifact edits for this spec, message
      `<change-name>: spec <n>/<m> — <spec-name>`
    The commit is the checkpoint's durable identity (recorded below), the
    Step 0 baseline of the next spec, and what makes every per-spec diff in
    this schema exact. If the project's workflow forbids per-spec commits,
    record the human-approved alternative in openspec/capability-profile.md (e.g.
    `git stash create` snapshot SHAs as baselines) — but a diff baseline
    there must be.

    Then present this exact structure to the human and STOP:

      ## ✓ Spec N/M complete: <spec-name>

      **Commit:** <sha> (baseline was <baseline-sha>)
      **Files changed:** <list>
      **Rings:** <list with ✅/⏭️ per ring, including 4, 7, 8>
      **Oracle polarity:** <N red→green confirmed, M green-by-design held>
      **Cross-module regression:** <modules run + result>
      **Exhaustiveness escalation:** <-Werror active | -Wconf added | n/a>
      **Adversarial review:** <PASS | PARTIAL/FAIL items with human decision needed> (fresh-context: yes/no)
      **Proof obligations:** <all enforced / list of manually-reviewed ones>
      **Concepts added to inventory:** <list or "none">
      **Concept registry files updated:** <list or "none / n.a.">
      **Concept delta (scanner diff):** <exactly as committed | deviations + resolution>
      **Build-dependency delta:** <none | new deps + where approved>
      **Cross-reference table updates:** Ring 3: +<added>/~<updated>, Ring 5: +<added>/~<updated>
      **Design decisions made:** <any deviation from the spec or notable choices>

      ---
      ⏸️  Waiting for your review before starting spec <N+1>: <next-spec-name>
      Reply "continue" (or describe changes you want) to proceed.

    DO NOT start Step 0 of the next spec until the human replies.
    DO NOT say "I'll go ahead and start the next one."
    DO NOT assume that approval of a previous spec carries forward.

    If the human requests changes: re-run only the affected rings, then
    re-present this checkpoint.

    ███████████████████████████████████████████████████████████████████████████

    After ALL specs are approved and their checkboxes marked, present a final
    summary with total ring results and the updated concept inventory.
